<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Order Confirmed</title>
</head>
<body>
<h2>Order Confirmed</h2>
<p>Your order <strong th:text="${orderId}">ORDER_ID</strong> is confirmed.</p>
<p><strong>Item:</strong> <span th:text="${itemName}">Item Name</span></p>
<p><strong>Status:</strong> <span th:text="${status}">STATUS</span></p>
<p><strong>Slot:</strong> <span th:text="${slotInfo}">Slot Info</span></p>
<p>Thank you for choosing our lab services.</p>
</body>
</html>
