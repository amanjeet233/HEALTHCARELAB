# ==================== SERVER CONFIGURATION ====================
server.port=8080
server.servlet.context-path=/

# ==================== DATABASE CONFIGURATION ====================
spring.datasource.url=jdbc:mysql://localhost:3306/labtestbooking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Amanjeet@4321.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pooling Optimization (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ==================== JPA & HIBERNATE CONFIGURATION ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Hibernate Batch Processing Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_version_data=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Query Optimization
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_sql_comments=false

# SQL Initialization (Spring Boot 2.5+)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# ==================== REDIS CACHE CONFIGURATION ====================
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5
spring.redis.jedis.pool.max-wait=-1ms

# Cache logging
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# ==================== JWT SECURITY CONFIGURATION ====================
jwt.secret=rrjAcuulfEbvXiv4W8rEPA==20skHyL6FUuUWzqNV2rxwQEEFg6BokakK4SRwlty
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==================== LOGGING CONFIGURATION ====================
logging.level.root=INFO
logging.level.com.healthcare=DEBUG
logging.level.com.healthcare.labtestbooking=DEBUG
logging.level.com.healthcare.labtestbooking.security=DEBUG
logging.level.com.healthcare.labtestbooking.config=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.orm.jpa=INFO

# Database Query Logging (Development Only - Disabled for Performance)
# Uncomment below to debug queries:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== ERROR HANDLING ====================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param

# ==================== FILE UPLOAD CONFIGURATION ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.directory=uploads/reports/

# ==================== RATE LIMITING CONFIGURATION ====================
app.rate-limit.enabled=true
app.rate-limit.default-requests-per-minute=100
app.rate-limit.login-requests-per-minute=5
app.rate-limit.register-requests-per-minute=3
app.rate-limit.payment-requests-per-minute=10

# ==================== ASYNC CONFIGURATION ====================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# ==================== AUDIT LOGGING ====================
logging.level.com.healthcare.labtestbooking.audit=INFO

# ==================== NOTIFICATION CONFIGURATION ====================
app.notification.email.from=no-reply@labtestbooking.local
app.notification.sms.mock=true
app.report.base-url=http://localhost:8080
app.frontend.url=http://localhost:3000

# ==================== PAYMENT GATEWAY CONFIGURATION ====================
app.payment.webhook.secret=change-me
app.payment.mock-base-url=http://localhost:8080/payments/mock

# Razorpay Payment Gateway
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:webhook_secret_placeholder}

# Payment Configuration
app.payment.success-url=http://localhost:5173/order/success
app.payment.failure-url=http://localhost:5173/order/failure
app.payment.currency=INR

# ==================== ACTUATOR HEALTH CHECK CONFIGURATION ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.path=/
management.health.diskspace.threshold=10MB
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==================== SWAGGER/OPENAPI DOCUMENTATION ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.persist-authorization=true

