# Security & Logging Configuration
logging.level.com.healthcare.labtestbooking=DEBUG
logging.level.com.healthcare.labtestbooking.security=DEBUG
logging.level.com.healthcare.labtestbooking.config=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG

# Exception handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param

# Redis Cache Configuration
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5
spring.redis.jedis.pool.max-wait=-1ms

# Cache logging
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# Notification defaults
app.notification.email.from=no-reply@labtestbooking.local
app.notification.sms.mock=true
app.report.base-url=http://localhost:8080

# Payment gateway (mock) defaults
app.payment.webhook.secret=change-me
app.payment.mock-base-url=http://localhost:8080/payments/mock
# Actuator Health Check Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.redis.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.path=/
management.health.diskspace.threshold=10MB
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Swagger/OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.persist-authorization=true